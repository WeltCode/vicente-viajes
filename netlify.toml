[build]
  command = "cd frontend && npm install && node scripts/generate-netlify-redirects.mjs && npm run build"
  publish = "frontend/dist"

# Deploy context para producción (rama master)
# Comentario de test: deploy separado por rama configurado correctamente
[context.master]
  command = "cd frontend && npm install && node scripts/generate-netlify-redirects.mjs && npm run build"
  publish = "frontend/dist"

# Deploy context para staging (rama develop)
[context.develop]
  command = "cd frontend && npm install && node scripts/generate-netlify-redirects.mjs && npm run build"
  publish = "frontend/dist"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https: wss:; frame-src 'self' https://vuelos.vicenteviajes.com https://www.google.com https://maps.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://vuelos.vicenteviajes.com; object-src 'none'; upgrade-insecure-requests"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
